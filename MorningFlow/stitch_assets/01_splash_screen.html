<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&amp;family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#3a3c3c",
              "secondary": "#c7c6c6",
              "secondary-fixed-dim": "#ababab",
              "on-tertiary-fixed-variant": "#e2e2e2",
              "primary-fixed": "#5d5f5f",
              "on-primary-container": "#000000",
              "on-surface-variant": "#c6c6c6",
              "outline-variant": "#474747",
              "outline": "#919191",
              "surface-dim": "#131313",
              "error": "#ffb4ab",
              "primary": "#ffffff",
              "primary-fixed-dim": "#454747",
              "on-error-container": "#ffdad6",
              "surface-container-lowest": "#0e0e0e",
              "inverse-primary": "#5d5f5f",
              "inverse-surface": "#e2e2e2",
              "surface-bright": "#393939",
              "on-background": "#e2e2e2",
              "on-primary-fixed-variant": "#e2e2e2",
              "on-error": "#690005",
              "on-primary": "#1a1c1c",
              "on-surface": "#e2e2e2",
              "surface-container-highest": "#353535",
              "on-secondary-fixed": "#1a1c1c",
              "primary-container": "#d4d4d4",
              "error-container": "#93000a",
              "surface-variant": "#353535",
              "on-secondary-container": "#e3e2e2",
              "inverse-on-surface": "#303030",
              "on-primary-fixed": "#ffffff",
              "on-tertiary": "#1b1b1b",
              "tertiary-fixed-dim": "#474747",
              "surface-container": "#1f1f1f",
              "secondary-container": "#464747",
              "surface-tint": "#c6c6c7",
              "on-secondary": "#1a1c1c",
              "tertiary-container": "#919191",
              "secondary-fixed": "#c7c6c6",
              "on-tertiary-container": "#000000",
              "background": "#131313",
              "surface": "#131313",
              "surface-container-high": "#2a2a2a",
              "tertiary-fixed": "#5e5e5e",
              "on-tertiary-fixed": "#ffffff",
              "surface-container-low": "#1b1b1b",
              "tertiary": "#e2e2e2"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fluid-gradient {
            background: radial-gradient(circle at top left, #1B1B1B 0%, #131313 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary">
<!-- Hero / Splash Container -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-between px-8 py-20 fluid-gradient overflow-hidden">
<!-- Abstract Visual Element -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-30">
<div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-white/5 blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[40%] rounded-full bg-white/5 blur-[80px]"></div>
</div>
<!-- Brand Anchor -->
<header class="z-10 flex flex-col items-center">
<div class="w-12 h-12 rounded-full border border-white/20 flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-white text-2xl" data-icon="waves">waves</span>
</div>
<h2 class="font-headline font-black tracking-tighter text-white uppercase text-sm letter-spacing-[0.3em]">
                MorningFlow
            </h2>
</header>
<!-- Centered Quote Section -->
<section class="z-10 max-w-2xl text-center flex flex-col items-center gap-12">
<div class="space-y-6">
<span class="font-label text-on-surface-variant tracking-[0.4em] uppercase text-[10px]">Daily Intention</span>
<h1 class="font-headline font-extralight text-white text-4xl md:text-6xl leading-[1.2] tracking-tight italic">
                    "The rhythm of the morning sets the tone for the symphony of your life."
                </h1>
</div>
<div class="h-[1px] w-24 bg-gradient-to-r from-transparent via-white/40 to-transparent"></div>
</section>
<!-- Interaction Area -->
<footer class="z-10 w-full max-w-xs flex flex-col items-center gap-8">
<button class="group relative w-full bg-primary text-on-primary font-headline font-bold py-5 px-10 rounded-xl transition-all duration-300 hover:scale-[1.02] active:scale-95 shadow-[0_0_30px_rgba(255,255,255,0.15)] flex items-center justify-center gap-3">
<span>Let's Begin</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<nav class="flex gap-8">
<a class="text-on-surface-variant font-label text-[10px] tracking-widest uppercase hover:text-white transition-colors" href="#">Sign In</a>
<a class="text-on-surface-variant font-label text-[10px] tracking-widest uppercase hover:text-white transition-colors" href="#">Restore</a>
</nav>
</footer>
<!-- Background Image Texture -->
<div class="absolute inset-0 z-0 mix-blend-overlay opacity-20">
<div class="w-full h-full bg-[url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&amp;fit=crop&amp;q=80&amp;w=2000')] bg-cover bg-center grayscale" data-alt="extreme close-up of dark flowing silk fabric with deep shadows and soft highlights creating abstract monochrome waves"></div>
</div>
</main>
<!-- Bottom Navigation suppressed for Splash Screen according to Shell Visibility Rule -->
</body></html>
